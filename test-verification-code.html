<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Verification Code Email</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0a2647 0%, #144272 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    h1 {
      color: #0a2647;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      color: #0a2647;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }
    
    button {
      width: 100%;
      background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
      color: #0a2647;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .result {
      margin-top: 30px;
      padding: 20px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
      display: none;
    }
    
    .result.success {
      background: #e8f5e9;
      border: 2px solid #4caf50;
      color: #2e7d32;
      display: block;
    }
    
    .result.error {
      background: #ffebee;
      border: 2px solid #f44336;
      color: #c62828;
      display: block;
    }
    
    .result.info {
      background: #fff9e6;
      border: 2px solid #d4af37;
      color: #0a2647;
      display: block;
    }
    
    .result-title {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 10px;
    }
    
    .verification-code {
      font-family: 'Courier New', Courier, monospace;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 8px;
      color: #d4af37;
      background: #0a2647;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      margin: 20px 0;
    }
    
    pre {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 12px;
      margin-top: 10px;
    }
    
    .endpoint-info {
      background: #e3f2fd;
      border: 2px solid #2196f3;
      color: #0a2647;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      font-size: 13px;
    }
    
    .endpoint-info strong {
      color: #1976d2;
    }
    
    .code {
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Test Verification Code Email</h1>
    <p class="subtitle">Test the password reset email function with verification codes</p>
    
    <div class="endpoint-info">
      <strong>📍 Testing Endpoint:</strong><br>
      <code class="code">https://anntzpswficnoekklsdr.supabase.co/functions/v1/make-server-a9dec19d/send-verification-code</code>
    </div>
    
    <form id="testForm">
      <div class="form-group">
        <label for="email">Recipient Email:</label>
        <input type="email" id="email" required placeholder="your.email@example.com">
      </div>
      
      <div class="form-group">
        <label for="name">Recipient Name:</label>
        <input type="text" id="name" required placeholder="Your Name">
      </div>
      
      <div class="form-group">
        <label for="code">Verification Code (6 digits):</label>
        <input type="text" id="code" required placeholder="123456" maxlength="6" pattern="[0-9]{6}">
      </div>
      
      <button type="submit" id="submitBtn">Send Test Email</button>
    </form>
    
    <div id="result" class="result"></div>
  </div>
  
  <script>
    const projectId = 'anntzpswficnoekklsdr';
    const publicAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFubnR6cHN3Zmljbm9la2tsc2RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjUwOTgsImV4cCI6MjA4ODEwMTA5OH0.No_ryirFyZGBXl2Q2mnY01dJwRDb0q9-ma1VneknGNk';
    
    // Generate random 6-digit code on page load
    document.getElementById('code').value = Math.floor(100000 + Math.random() * 900000).toString();
    
    document.getElementById('testForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const resultDiv = document.getElementById('result');
      
      const email = document.getElementById('email').value;
      const name = document.getElementById('name').value;
      const code = document.getElementById('code').value;
      
      // Validate code format
      if (!/^\d{6}$/.test(code)) {
        showResult('error', 'Invalid Code', 'Verification code must be exactly 6 digits.');
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      resultDiv.style.display = 'none';
      
      try {
        console.log('📤 Sending test email...');
        console.log('Email:', email);
        console.log('Name:', name);
        console.log('Code:', code);
        
        const serverUrl = `https://${projectId}.supabase.co/functions/v1/make-server-a9dec19d/send-verification-code`;
        
        const response = await fetch(serverUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${publicAnonKey}`,
          },
          body: JSON.stringify({
            recipientEmail: email,
            recipientName: name,
            verificationCode: code,
          }),
        });
        
        const data = await response.json();
        
        console.log('📥 Response:', data);
        
        if (data.demoMode) {
          // Demo mode - show code
          showResult('info', '⚠️ Demo Mode Active', 
            `The email service is running in demo mode. No email was sent, but the system is working correctly!
            
            <div class="verification-code">${code}</div>
            
            <strong>Why demo mode?</strong><br>
            • RESEND_API_KEY not configured in Supabase<br>
            • Or Resend domain not verified<br>
            <br>
            <strong>To enable real emails:</strong><br>
            1. Get API key from <a href="https://resend.com/api-keys" target="_blank">resend.com/api-keys</a><br>
            2. Add to Supabase: Project Settings → Edge Functions → Secrets<br>
            3. Name: <code class="code">RESEND_API_KEY</code><br>
            4. Value: Your Resend API key<br>
            <br>
            <strong>Response:</strong>
            <pre>${JSON.stringify(data, null, 2)}</pre>
            `
          );
        } else if (response.ok && data.success) {
          // Success
          showResult('success', '✅ Email Sent Successfully!', 
            `The verification code email was sent to <strong>${email}</strong>
            
            <div class="verification-code">${code}</div>
            
            Check your inbox (and spam folder) for the email!
            
            <strong>Response:</strong>
            <pre>${JSON.stringify(data, null, 2)}</pre>
            `
          );
        } else {
          // Error
          showResult('error', '❌ Error Sending Email', 
            `${data.error || 'Unknown error occurred'}
            
            <strong>Response:</strong>
            <pre>${JSON.stringify(data, null, 2)}</pre>
            `
          );
        }
      } catch (error) {
        console.error('Error:', error);
        showResult('error', '❌ Request Failed', 
          `Failed to connect to the server function.
          
          <strong>Possible causes:</strong><br>
          • Server function not deployed yet<br>
          • Network connection issue<br>
          • CORS configuration issue<br>
          <br>
          <strong>Error:</strong><br>
          ${error.message}
          
          <strong>How to fix:</strong><br>
          1. Deploy the function: <code class="code">./deploy-verification-code.sh</code><br>
          2. Or manually deploy via Supabase dashboard<br>
          <br>
          See <code class="code">DEPLOY_VERIFICATION_CODE.md</code> for full instructions.
          `
        );
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Test Email';
      }
    });
    
    function showResult(type, title, message) {
      const resultDiv = document.getElementById('result');
      resultDiv.className = `result ${type}`;
      resultDiv.innerHTML = `
        <div class="result-title">${title}</div>
        <div>${message}</div>
      `;
    }
  </script>
</body>
</html>
